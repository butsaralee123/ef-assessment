// ===== ฟังก์ชันบันทึกข้อมูลที่เปลี่ยนไปใช้ Google Sheets =====

async function submitAssessment() {

  document.getElementById('btn-submit').disabled = true;

  document.getElementById('submit-loading').classList.remove('hidden');

  document.getElementById('submit-error').classList.add('hidden');



  const scores = computeScores(); // จากฟังก์ชันเดิม

  const record = {

    school_name: document.getElementById('school-input').value.trim(),

    gender: selectedGender,

    grade_level: selectedGrade,

    created_at: new Date().toISOString()

  };



  // รวมคะแนนรายข้อ

  for (let i = 1; i <= 45; i++) {

    record[`q${i}`] = answers[`q${i}`] || 0;

  }



  // รวมคะแนนดิบและ T-Score

  /* ... ใส่ลูป record[`${skill.key}_raw`] เหมือนโค้ดเดิม ... */



  try {

    // ยิง API ไปที่ Google Apps Script

    const response = await fetch(SCRIPT_URL, {

      method: "POST",

      // ใช้ text/plain เพื่อป้องกันปัญหาเรื่อง CORS preflight ของเบราว์เซอร์

      headers: { "Content-Type": "text/plain;charset=utf-8" },

      body: JSON.stringify(record)

    });

    

    const result = await response.json();

    

    document.getElementById('btn-submit').disabled = false;

    document.getElementById('submit-loading').classList.add('hidden');



    if (result.isOk) {

      // เมื่อบันทึกเสร็จ ให้เพิ่มข้อมูลเข้าระบบเพื่อแสดงผลทันที

      allRecords.push(record); 

      showResults();

    } else {

      throw new Error(result.error || "Unknown error");

    }

  } catch (error) {

    document.getElementById('btn-submit').disabled = false;

    document.getElementById('submit-loading').classList.add('hidden');

    document.getElementById('submit-error').textContent = 'เกิดข้อผิดพลาดในการบันทึก: ' + error.message;

    document.getElementById('submit-error').classList.remove('hidden');

  }

}



// ===== ฟังก์ชันดึงประวัติข้อมูลตอนเปิดเว็บ =====

async function fetchHistoryFromSheet() {

  try {

    const response = await fetch(SCRIPT_URL);

    const data = await response.json();

    if (data && Array.isArray(data)) {

      allRecords = data;

      // แปลงวันที่กลับมาให้ถูกต้อง

      allRecords.forEach(r => {

        if (r.created_at) r.created_at = new Date(r.created_at).toISOString();

      });

      // อัปเดตประวัติในหน้าผลลัพธ์ (ถ้าแสดงอยู่)

      if (!document.getElementById('page-results').classList.contains('hidden')) {

        renderHistory();

      }

    }

  } catch (err) {

    console.error("ไม่สามารถดึงข้อมูลประวัติจาก Google Sheets ได้:", err);

  }

}
